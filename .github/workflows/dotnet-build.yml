name: .NET CI - Build, Test & Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test NetCICDPortfolioDemo.Tests/NetCICDPortfolioDemo.Tests.csproj --no-build --configuration Release --verbosity normal

    - name: Publish project
      run: dotnet publish --no-build --configuration Release -o ./publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-publish
        path: ./publish
        retention-days: 7

    - name: Display secrets status (for testing)
      run: |
        echo "API Key is set: ${{ secrets.API_KEY != '' }}"
        echo "Connection String is set: ${{ secrets.CONNECTION_STRING != '' }}"